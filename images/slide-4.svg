<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Accent Red -->
    <linearGradient id="accentRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d32f2f"/>
      <stop offset="100%" stop-color="#ff5252"/>
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="softShadowPro">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Top Accent Bar -->
  <rect x="0" y="0" width="800" height="6" fill="url(#accentRed)"/>

  <!-- Left Border Accent -->
  <rect x="0" y="0" width="6" height="400" fill="#d32f2f"/>

  <!-- Main Title -->
  <text x="80" y="90" font-size="32" font-weight="800" fill="#222">
    သင့်လုပ်ငန်းကို တိုးတက်အောင်လုပ်လိုက်ပါ
  </text>

  <!-- Subtitle -->
  <text x="80" y="120" font-size="16" fill="#666">
    ကြော်ငြာဝန်ဆောင်မှုများဖြင့် Customer များပိုမိုရရှိနိုင်သည်
  </text>

  <!-- Divider -->
  <line x1="80" y1="140" x2="720" y2="140" stroke="#eee"/>

  <!-- Services Section -->
  <text x="80" y="180" font-size="15" fill="#333">
    ✓ ကြော်ငြာ Campaign စီမံခြင်း
  </text>
  <text x="80" y="210" font-size="15" fill="#333">
    ✓ Brand Partnership များ
  </text>
  <text x="80" y="240" font-size="15" fill="#333">
    ✓ Promotion အထူးအစီအစဉ်များ
  </text>

  <!-- Contact Card -->
  <g filter="url(#softShadowPro)">
    <rect x="480" y="160" width="260" height="120" rx="12" fill="#fafafa" stroke="#eee"/>
  </g>

  <!-- Email Label -->
  <text x="500" y="195" font-size="13" fill="#888">
    ဆက်သွယ်ရန် Email
  </text>

  <!-- Email -->
  <text x="500" y="220" font-size="16" font-weight="700" fill="#222">
    mmtw.cs@gmail.com
  </text>

  <!-- CTA Button -->
  <g filter="url(#softShadowPro)">
    <rect x="80" y="280" width="220" height="42" rx="6" fill="#d32f2f"/>
  </g>

  <text x="190" y="306" font-size="15" font-weight="700" fill="white" text-anchor="middle">
    ယနေ့ပဲ ဆက်သွယ်ပါ
  </text>

  <!-- Footer Note -->
  <text x="80" y="350" font-size="12" fill="#999">
    Professional Advertising Service
  </text>

</svg>
