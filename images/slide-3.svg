<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Dark Gradient -->
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Red Accent -->
    <linearGradient id="redAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="shadowDark">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#darkBg)"/>

  <!-- Top Accent Line -->
  <rect x="0" y="0" width="800" height="4" fill="url(#redAccent)"/>

  <!-- Main Title -->
  <text x="80" y="90" font-size="30" font-weight="800" fill="white">
    သင့်လုပ်ငန်းကို တိုးတက်အောင်ဖို့ မြှင့်တင်လိုက်ပါ
  </text>

  <!-- Subtitle -->
  <text x="80" y="120" font-size="15" fill="#cbd5e1">
    ကြော်ငြာဝန်ဆောင်မှုဖြင့် သင့်လုပ်ငန်းကို ပိုမိုတိုးတက်စေနိုင်သည်
  </text>

  <!-- Divider -->
  <line x1="80" y1="140" x2="720" y2="140" stroke="#334155"/>

  <!-- Services -->
  <text x="80" y="180" font-size="14" fill="#e2e8f0">
    • Campaign စီမံခန့်ခွဲမှု
  </text>
  <text x="80" y="205" font-size="14" fill="#e2e8f0">
    • Brand Partnership
  </text>
  <text x="80" y="230" font-size="14" fill="#e2e8f0">
    • Promotion အစီအစဉ်များ
  </text>

  <!-- Contact Card -->
  <g filter="url(#shadowDark)">
    <rect x="460" y="160" width="260" height="120" rx="10" fill="#111827" stroke="#374151"/>
  </g>

  <!-- Contact Label -->
  <text x="480" y="195" font-size="13" fill="#9ca3af">
    ဆက်သွယ်ရန် Email
  </text>

  <!-- Email -->
  <text x="480" y="220" font-size="16" font-weight="700" fill="white">
    mmtw.cs@gmail.com
  </text>

  <!-- CTA Button -->
  <g filter="url(#shadowDark)">
    <rect x="80" y="280" width="220" height="42" rx="6" fill="#ef4444"/>
  </g>

  <text x="190" y="306" font-size="15" font-weight="700" fill="white" text-anchor="middle">
    ယနေ့ပဲ ဆက်သွယ်ပါ
  </text>

  <!-- Bottom Accent -->
  <rect x="80" y="330" width="60" height="3" fill="#ef4444"/>

</svg>
